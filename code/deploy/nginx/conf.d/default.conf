server {
    listen 80;
    server_name localhost;

    # Frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Auth Service - Rota mais específica, deve vir antes de /api
    location /api/auth {
        proxy_pass http://auth:3002; # Passa /api/auth/... para http://auth:3002/api/auth/...
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API - Rota mais genérica, vem depois
    location /api {
        proxy_pass http://backend:3001; # Passa /api/... para http://backend:3001/api/...
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Mock Banking API
    location /banking { # Se o mock-banking também espera /api/banking, precisaria de ajuste similar
        rewrite ^/banking/(.*)$ /$1 break; # Mantido por enquanto, assumindo que mock-banking não espera /api
        proxy_pass http://mock-banking:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
